<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ryzzenimm | YT Cloud Analyzer</title>
    <style>
        :root {
            --primary: #00ff41; /* Matrix Yeşili */
            --bg: #0a0a0a;
            --card: #151515;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .terminal-container {
            width: 90%;
            max-width: 600px;
            background: var(--card);
            border: 1px solid #333;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.1);
        }

        .header {
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
            margin-bottom: 20px;
            text-align: left;
        }

        .header h1 {
            margin: 0;
            font-size: 22px;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .log-box {
            height: 200px;
            background: #000;
            padding: 15px;
            border-radius: 5px;
            overflow-y: auto;
            font-size: 13px;
            line-height: 1.6;
            margin-bottom: 20px;
            border: 1px solid #222;
        }

        .log-entry { margin-bottom: 5px; }
        .log-success { color: var(--primary); }
        .log-info { color: #00bcff; }
        .log-warn { color: #ffcc00; }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        button {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 12px;
            cursor: pointer;
            font-weight: bold;
            font-family: 'Courier New';
            transition: all 0.3s;
            text-transform: uppercase;
        }

        button:hover:not(:disabled) {
            background: var(--primary);
            color: black;
            box-shadow: 0 0 15px var(--primary);
        }

        button:disabled {
            border-color: #444;
            color: #444;
            cursor: not-allowed;
        }

        #reward-section {
            display: none;
            margin-top: 20px;
            padding: 20px;
            border: 2px dashed var(--primary);
            animation: blink 1s infinite alternate;
        }

        @keyframes blink {
            from { opacity: 1; }
            to { opacity: 0.7; }
        }

        .uc-amount {
            font-size: 28px;
            color: #ffd700;
            display: block;
            margin: 10px 0;
        }
    </style>
</head>
<body>

<div class="terminal-container">
    <div class="header">
        <h1>[ R Y Z Z E N I M M ] SYSTEM v2.4</h1>
        <small style="color: #666;">Status: Online | User: Guest</small>
    </div>

    <div class="log-box" id="logs">
        <div class="log-entry log-info">> System initialized...</div>
        <div class="log-entry">> Awaiting user command...</div>
    </div>

    <div class="btn-group">
        <button id="startBtn" onclick="runAnalysis()">Bulut Analizini Başlat</button>
        <button id="subBtn" style="display:none;" onclick="handleSubscribe()">YouTube Kanalına Abone Ol</button>
    </div>

    <div id="reward-section" style="text-align: center;">
        <span style="color: #fff;">Sistem Doğrulaması Tamamlandı!</span>
        <span class="uc-amount">360 UC KODU AKTİF</span>
        <p style="font-size: 12px;">UC'nizi teslim almak için şu maile "UC TALEBİ" yazın:</p>
        <strong style="color: var(--primary);">lgnwfvbk@gmail.com</strong>
    </div>
</div>

<script>
    const logBox = document.getElementById('logs');
    const startBtn = document.getElementById('startBtn');
    const subBtn = document.getElementById('subBtn');
    const rewardSection = document.getElementById('reward-section');

    function addLog(text, type = '') {
        const div = document.createElement('div');
        div.className = `log-entry ${type}`;
        div.innerHTML = `> ${text}`;
        logBox.appendChild(div);
        logBox.scrollTop = logBox.scrollHeight;
    }

    async function runAnalysis() {
        startBtn.disabled = true;
        addLog("Bağlantı kuruluyor: Ryzzenimm_Server_Alpha...", "log-info");
        
        const steps = [
            { t: "YouTube API anahtarları kontrol ediliyor...", s: "log-info" },
            { t: "Kanal istatistikleri çekiliyor: @Ryzzenimm_Analytics", s: "" },
            { t: "Anlık izlenme verileri normalize ediliyor...", s: "" },
            { t: "Abone veri tabanı taranıyor...", s: "log-warn" },
            { t: "HATA: Kullanıcı aboneliği bulunamadı!", s: "log-warn" },
            { t: "Sistem: Ödül protokolü için abonelik şart.", s: "" },
            { t: "Analiz tamamlandı. Abone ol butonu aktif.", s: "log-success" }
        ];

        for (let step of steps) {
            await new Promise(r => setTimeout(r, 1200));
            addLog(step.t, step.s);
        }

        startBtn.style.display = "none";
        subBtn.style.display = "block";
    }

    function handleSubscribe() {
        window.open("https://www.youtube.com/channel/UCGbn4t8ULIWnC25wzEyynzw", "_blank");
        
        subBtn.disabled = true;
        subBtn.innerText = "DOĞRULANIYOR...";
        addLog("YouTube yönlendirmesi yapıldı.", "log-info");
        addLog("Abonelik durumu kontrol ediliyor (Sync: 10s)...", "log-warn");

        setTimeout(() => {
            addLog("Abonelik algılandı! Veri tabanı güncellendi.", "log-success");
            addLog("UC gönderim protokolü başlatıldı...", "log-info");
            subBtn.style.display = "none";
            rewardSection.style.display = "block";
        }, 8000);
    }
</script>

</body>
</html>
